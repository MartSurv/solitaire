<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Pasjansas — Kortų Žaidimai</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>♠</text></svg>"
    />
    <link rel="stylesheet" href="shared.css" />
    <link rel="prefetch" href="index.html" />
  </head>
  <body>
    <canvas id="bg"></canvas>
    <div class="felt"></div>
    <canvas id="winCanvas"></canvas>

    <div class="hdr">
      <div class="logo">
        <a href="index.html" class="home-link">←</a>
        <i>♠</i> Pasjansas
      </div>
      <div class="stats">
        <div class="st">Taškai<b id="score">0</b></div>
        <div class="st">Ėjimai<b id="moves">0</b></div>
        <div class="st">Laikas<b id="timer">0:00</b></div>
      </div>
      <div class="ctrls">
        <button class="btn icon-btn" id="hintBtn" title="Užuomina" aria-label="Užuomina"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M15.09 14c.18-.98.65-1.74 1.41-2.5A4.65 4.65 0 0 0 18 8 6 6 0 0 0 6 8c0 1 .23 2.23 1.5 3.5A4.61 4.61 0 0 1 8.91 14"/></svg></button>
        <button class="btn icon-btn" id="undoBtn" title="Atšaukti" aria-label="Atšaukti"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg></button>
        <button class="btn icon-btn" id="redoBtn" title="Pakartoti" aria-label="Pakartoti"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg></button>
        <button class="btn icon-btn" id="statsBtn" title="Statistika" aria-label="Statistika"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></button>
        <button class="btn icon-btn" id="settingsBtn" title="Nustatymai" aria-label="Nustatymai"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
        <div class="ctrl-divider"></div>
        <button class="btn gold" id="newBtn">Naujas žaidimas</button>
      </div>
    </div>

    <div class="game" id="game">
      <div class="top-row">
        <div class="top-left">
          <div class="slot stock" id="stock"></div>
          <div class="waste" id="waste"></div>
        </div>
        <div class="top-right">
          <div class="slot foundation" id="f0" data-suit="♠"></div>
          <div class="slot foundation" id="f1" data-suit="♥"></div>
          <div class="slot foundation" id="f2" data-suit="♦"></div>
          <div class="slot foundation" id="f3" data-suit="♣"></div>
        </div>
      </div>
      <div class="tableau">
        <div class="pile" id="p0"></div>
        <div class="pile" id="p1"></div>
        <div class="pile" id="p2"></div>
        <div class="pile" id="p3"></div>
        <div class="pile" id="p4"></div>
        <div class="pile" id="p5"></div>
        <div class="pile" id="p6"></div>
      </div>
    </div>

    <div class="auto-banner" id="autoBanner">
      Visos kortos atvertos!
      <button class="btn gold" id="autoBtn">Užbaigti automatiškai</button>
    </div>
    <div class="auto-banner" id="stuckBanner">
      Nebeliko ėjimų.
      <button class="btn gold" id="stuckNewBtn">Naujas žaidimas</button>
    </div>

    <div class="overlay" id="winOverlay">
      <div class="modal">
        <h2>Laimėjai!</h2>
        <p>Puikus žaidimas. Štai tavo statistika.</p>
        <div class="fstats">
          <div class="fst">
            <div class="v" id="fScore">0</div>
            <div class="l">Taškai</div>
          </div>
          <div class="fst">
            <div class="v" id="fMoves">0</div>
            <div class="l">Ėjimai</div>
          </div>
          <div class="fst">
            <div class="v" id="fTime">0:00</div>
            <div class="l">Laikas</div>
          </div>
        </div>
        <div class="fstats" style="opacity: 0.55; margin-top: -10px">
          <div class="fst">
            <div class="v" id="fWins" style="font-size: 18px">0</div>
            <div class="l">Viso pergalių</div>
          </div>
          <div class="fst">
            <div class="v" id="fBest" style="font-size: 18px">0</div>
            <div class="l">Geriausias rezultatas</div>
          </div>
          <div class="fst">
            <div class="v" id="fStreak" style="font-size: 18px">0</div>
            <div class="l">Pergalių serija</div>
          </div>
        </div>
        <button
          class="btn gold"
          style="font-size: 14px; padding: 11px 30px"
          id="playAgainBtn"
        >
          Žaisti dar
        </button>
      </div>
    </div>

    <div class="overlay" id="statsOverlay">
      <div class="modal">
        <h2>Statistika</h2>
        <p>Tavo viso laiko rezultatai.</p>
        <div class="stats-grid" id="statsGrid"></div>
        <button
          class="btn gold"
          onclick="
            document.getElementById('statsOverlay').classList.remove('show')
          "
        >
          Uždaryti
        </button>
      </div>
    </div>

    <script src="shared.js"></script>
    <script src="klondike.js"></script>
  </body>
</html>
